name: Publish Package

on:
  release:
    types:
      - released
  workflow_dispatch:
    inputs:
      npm:
        default: "yes"
        description: Publish to NPM?
        required: true
      gpr:
        default: "yes"
        description: Publish to GPR?
        required: true
      dist-tag:
        default: "latest"
        description: NPM dist-tag

permissions:
  contents: read

jobs:
  prepare:
    name: Prepare source code
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: github.event_name == 'release' || github.event.inputs.npm == 'yes' || github.event.inputs.gpr == 'yes'
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          disable-sudo: true
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            objects.githubusercontent.com:443
            nodejs.org:443
            registry.npmjs.org:443

      - name: Prepare source
        uses: myrotvorets/composite-actions/node-prepublish@0b8b877ead5e4e6718786803b91d295017964111

  publish-npm:
    name: Publish package to npm
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
      packages: write
      statuses: write
      id-token: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          disable-sudo: true
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            objects.githubusercontent.com:443
            nodejs.org:443
            fulcio.sigstore.dev:443
            registry.npmjs.org:443
            rekor.sigstore.dev:443

      - name: Publish package
        uses: myrotvorets/composite-actions/node-publish@0b8b877ead5e4e6718786803b91d295017964111
        with:
          registry-url: https://registry.npmjs.org/
          dist-tag: ${{ github.event.inputs.dist-tag }}
        if: github.event.inputs.npm == 'yes' || github.event_name == 'release'

  publish-gpr:
    name: Publish package to GPR
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
      packages: write
      statuses: write
      id-token: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          disable-sudo: true
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            objects.githubusercontent.com:443
            nodejs.org:443
            fulcio.sigstore.dev:443
            registry.npmjs.org:443
            rekor.sigstore.dev:443
            npm.pkg.github.com:443

      - name: Publish package
        uses: myrotvorets/composite-actions/node-publish@0b8b877ead5e4e6718786803b91d295017964111
        with:
          node-auth-token: ${{ github.token }}
          registry-url: https://npm.pkg.github.com/
          dist-tag: ${{ github.event.inputs.dist-tag }}
        if: github.event.inputs.gpr == 'yes' || github.event_name == 'release'
